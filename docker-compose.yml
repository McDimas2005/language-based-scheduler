services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./LEGACY:/LEGACY:ro
      - ./backend/.tokens:/app/.tokens
    environment:
      BERT_CHECKPOINT_PATH: /LEGACY/last_trained_model_checkpoint.pth
      GOOGLE_TOKEN_PATH: /app/.tokens/google_token.json

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_URL: http://localhost:8000
